<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mesjid Hayat Kamal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-moon-stars-fill"></i>
                Mesjid Hayat Kamal
            </a>
        </div>
    </nav>
    <section class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card shadow border-0 rounded-4">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-circle text-success" style="font-size: 70px;"></i>
                                <h2 class="fw-bold mt-3">
                                    Login Admin
                                </h2>
                                <p class="text-muted">
                                    Silahkan login untuk masuk ke dashboard
                                </p>
                            </div>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        Email
                                    </label>
                                    <input type="email" class="form-control" placeholder="Masukkan email">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">
                                        Password
                                    </label>
                                    <input type="password" class="form-control" placeholder="Masukkan password">
                                </div>
                                <div class="d-grid">
                                    <a href="dashboard.html" class="btn btn-success btn-lg">
                                        Login
                                    </a>
                                </div>
                            </form>
                            <div class="text-center mt-4">
                                <p class="mb-1">
                                    Belum punya akun?
                                    <a href="#" class="text-success text-decoration-none">
                                        Daftar
                                    </a>
                                </p>
                                <a href="index.html" class="text-decoration-none">
                                    ← Kembali ke Home
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
